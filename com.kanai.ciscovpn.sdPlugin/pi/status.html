<!DOCTYPE html>
<html>
  <head lang="en">
    <title>VPN Status Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
  </head>
  <body>
    <sdpi-item label="VPN Profile Name">
      <sdpi-textfield setting="profile" placeholder="e.g. Corporate VPN"></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Poll Interval (seconds)">
      <sdpi-range setting="pollInterval" min="1" max="60" default="5" showlabels></sdpi-range>
    </sdpi-item>

    <sdpi-item label="Username (optional)">
      <sdpi-textfield setting="username" placeholder="username"></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Password (optional)">
      <sdpi-password setting="password" placeholder="password"></sdpi-password>
    </sdpi-item>

    <sdpi-item label="MFA / Second Password (optional)">
      <sdpi-password setting="secondPassword" placeholder="TOTP or push"></sdpi-password>
    </sdpi-item>
  </body>
</html>
